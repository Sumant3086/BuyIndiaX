# MongoDB Database Deployment
# Stores all application data (users, products, orders)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: buyindiax
  labels:
    app: mongodb
spec:
  replicas: 1  # Single instance for development, use StatefulSet for production
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0  # Official MongoDB image
        ports:
        - containerPort: 27017  # MongoDB default port
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "admin"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: password
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db  # MongoDB data directory
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc
---
# MongoDB Service - Internal network access
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: buyindiax
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP  # Internal only
