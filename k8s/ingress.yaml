# Ingress - Routes external traffic to services
# Provides SSL/TLS termination and domain routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buyindiax-ingress
  namespace: buyindiax
  annotations:
    # Use nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    
    # Enable SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # Certificate manager for auto SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - buyindiax.com  # Your domain
    - www.buyindiax.com
    secretName: buyindiax-tls  # SSL certificate secret
  rules:
  - host: buyindiax.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: buyindiax-service
            port:
              number: 80
  - host: www.buyindiax.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: buyindiax-service
            port:
              number: 80
