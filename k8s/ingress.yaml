# Ingress for routing traffic
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buyindiax-ingress
  namespace: buyindiax
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: buyindiax.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
