# Persistent Volume Claim for MongoDB
# Ensures data persists even if pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: buyindiax
spec:
  accessModes:
    - ReadWriteOnce  # Single node read-write
  resources:
    requests:
      storage: 10Gi  # 10GB storage for database
