# Kubernetes Secrets - Store sensitive data
# IMPORTANT: In production, use external secret management (AWS Secrets Manager, HashiCorp Vault)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: buyindiax
type: Opaque
data:
  # Base64 encoded password (echo -n 'your-password' | base64)
  password: bW9uZ29wYXNzd29yZDEyMw==  # mongopassword123
