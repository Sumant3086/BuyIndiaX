# Kubernetes Secret template — DO NOT commit real values
# Generate base64 values with: echo -n "your-value" | base64
#
# Usage:
#   export JWT_SECRET=$(echo -n "your-jwt-secret" | base64)
#   envsubst < k8s/secrets.yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: buyindiax-secrets
  namespace: buyindiax
type: Opaque
data:
  # Replace these placeholders with base64-encoded real values before applying
  JWT_SECRET: <base64-encoded-jwt-secret>
  RAZORPAY_KEY_ID: <base64-encoded-razorpay-key-id>
  RAZORPAY_KEY_SECRET: <base64-encoded-razorpay-key-secret>
