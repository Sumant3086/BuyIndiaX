# Default values for BuyIndiaX Helm Chart
# Override these values during installation: helm install --set key=value

# Application configuration
app:
  name: buyindiax-app
  replicaCount: 3  # Number of application pods
  image:
    repository: sumant3086/buyindiax
    tag: latest
    pullPolicy: Always
  
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  # Service configuration
  service:
    type: LoadBalancer
    port: 80
    targetPort: 5000

# MongoDB configuration
mongodb:
  enabled: true
  replicaCount: 1
  image:
    repository: mongo
    tag: "6.0"
  
  # MongoDB credentials
  auth:
    username: admin
    password: mongopassword123  # Change in production
    database: buyindiax
  
  # Storage
  persistence:
    enabled: true
    size: 10Gi
  
  # Resource limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: buyindiax.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: buyindiax-tls
      hosts:
        - buyindiax.com

# Monitoring configuration
monitoring:
  prometheus:
    enabled: true
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: admin123  # Change in production

# Application secrets
secrets:
  jwtSecret: "your-super-secret-jwt-key"
  razorpay:
    keyId: "rzp_test_SZT2as0qsWZtkR"
    keySecret: "uJLKwIAhb6JcXu2PWIoBzHhC"
  googleApiKey: "your-google-api-key"
  email:
    user: "your-email@gmail.com"
    password: "your-app-password"
